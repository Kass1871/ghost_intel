{% extends "base.html" %}
{% load static %}
{% block title %}Weapons{% endblock title %}
{% block main %}
<div class="wp-wrapper">
    <div class="container">
        <form action="{% url "weapons" %}" method="post">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Weapon name" value={{data.name}}>
            <select name="weapon_type" id="type">
                <option value="" selected disabled>--Weapon Type--</option>
                {% for value, label in weapon_types %}
                    <option value="{{value}}">{{label}}</option>
                {% endfor %}
            </select>
            <button type="submit">Save</button>
        </form>
    </div>
    <div class="container">
        <table>
            <tr>
                <thead>
                    <tr>Title</tr>
                    <tr>Type</tr>
                </thead>
                <tbody>
                    {% for weapon in weapon_list %}
                        <tr>
                            <td>{{weapon.name}}</td>
                            <td>{{weapon.weapon_type}}</td>
                            <td><a href="{% url "weapon_details" weapon.id %}">Details</a></td>
                        </tr>
                    {% endfor %}
                </tbody>
            </tr>
        </table>
    </div>
</div>
{% endblock main %}

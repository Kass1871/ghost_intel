{% extends "base.html" %}
{% load static %}
{% block title %}Weapons{% endblock title %}
{% block main %}
    <div class="container">
        <form action="{% url "weapons" %}" method="post">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Weapon name">
            <select name="type" id="type">
                <option value="" selected disabled>--Weapon Type--</option>
                {% for value in weapon_types %}
                    <option value="{{value}}">{{label}}</option>
                {% endfor %}
            </select>
            <button type="submit">Save</button>
        </form>
    </div>
{% endblock main %}

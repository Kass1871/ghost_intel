{% extends "base.html" %}
{% load static %}
{% block title %}Welcome{% endblock title %}
{% block main %}
    <div class="mp-wrapper">
        <h1 class="mp-text">A place to find <span>builds</span> and <span>News</span> about Destiny 2</h1>    
        <div class="mp-container">
            <div class="card">
                <a href="{% url "builds" %}" class="card-link">
                    <img src="https://i.imgur.com/W4SM8FN.jpeg" alt="Builds">
                    <div class="card-main">
                        <p>Find <span>ALL</span> sorts of builds for your class and playstyle</p>
                    </div>
                </a>
            </div> 
            <div class="card">
                <a href="{% url "news" %}" class="card-link">
                    <img src="https://i.imgur.com/VIihN9R.jpeg" alt="News">
                    <div class="card-main">
                        <p>Events, pathes, updates, and News about the game.</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
{% endblock main %}
